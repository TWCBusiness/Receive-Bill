<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wacoal - Receive Bill System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }
        .wacoal-pink { color: #E3004F; }
        .bg-wacoal-pink { background-color: #E3004F; }
        .btn-hover:hover { background-color: #c20044; transform: translateY(-1px); }
        
        /* Glassmorphism */
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(227, 0, 79, 0.1);
        }
        
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .loader {
            border-top-color: #E3004F;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hide-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .hide-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #e3004f44; border-radius: 10px; }
        
        /* Fixed Table Header */
        .table-container {
            max-height: calc(100vh - 200px);
            overflow: auto;
        }
        thead th { position: sticky; top: 0; z-index: 20; }
    </style>
</head>
<body>

    <div id="globalLoader" class="fixed inset-0 bg-white/60 backdrop-blur-sm hidden flex items-center justify-center z-[100]">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
    </div>

    <nav id="mainNav" class="hidden sticky top-0 z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 bg-wacoal-pink rounded-lg flex items-center justify-center text-white font-bold text-lg">W</div>
                    <span class="font-semibold text-gray-800 hidden sm:block">Wacoal Service</span>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <button onclick="fetchData()" class="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-all" title="Refresh">
                        🔄 <span class="text-xs ml-1 hidden sm:inline">รีเฟรช</span>
                    </button>
                    <div class="h-6 w-[1px] bg-gray-200 mx-1"></div>
                    <button onclick="logout()" class="text-sm font-medium text-gray-600 hover:text-red-600 px-3 py-2 transition-colors">
                        ออกจากระบบ
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="app" class="flex flex-col items-center justify-center p-4">
        
        <div id="loginPage" class="w-full max-w-md bg-white rounded-3xl card-shadow p-8 mt-10 transition-all duration-500">
            <div class="text-center mb-10">
                <div class="text-3xl font-black wacoal-pink tracking-widest mb-2">WACOAL</div>
                <h2 class="text-lg font-medium text-gray-500 uppercase tracking-wider">Receive Bill Portal</h2>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="relative">
                    <input type="text" id="username" required 
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-red-100 focus:border-wacoal-pink outline-none transition-all"
                        placeholder="Store ID / รหัสร้านค้า">
                </div>
                <div class="relative">
                    <input type="password" id="password" required 
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-red-100 focus:border-wacoal-pink outline-none transition-all"
                        placeholder="Password">
                </div>
                <button type="submit" 
                    class="w-full bg-wacoal-pink text-white font-semibold py-4 rounded-2xl btn-hover transition-all shadow-lg shadow-red-200">
                    เข้าสู่ระบบ
                </button>
            </form>
            <div id="loginError" class="mt-4 text-center text-red-500 text-sm hidden font-medium">❌ ข้อมูลไม่ถูกต้อง</div>
            
            <div id="urlWarning" class="mt-8 p-4 bg-amber-50 rounded-2xl text-amber-700 text-xs border border-amber-100 hidden">
                <strong>Demo Mode:</strong> Password is "1234"
            </div>
        </div>

        <div id="dashboardPage" class="hidden w-full max-w-7xl mt-4">
            <div class="bg-white rounded-2xl card-shadow p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="text-center md:text-left">
                    <h1 class="text-2xl font-bold text-gray-800" id="userDisplayName">Welcome</h1>
                    <p class="text-gray-400 text-sm">ตรวจสอบและบันทึกข้อมูลการรับบิลประจำวัน</p>
                </div>
                <div class="flex gap-3 bg-gray-50 p-2 rounded-xl">
                    <div class="px-4 py-2 text-center">
                        <span class="block text-xs text-gray-400 uppercase">สถานะ</span>
                        <span class="text-sm font-bold text-green-500">Online</span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl card-shadow overflow-hidden border border-gray-50">
                <div class="table-container hide-scroll">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/80 backdrop-blur text-gray-500 text-xs uppercase tracking-wider">
                                <th class="px-6 py-4 font-semibold">Store</th>
                                <th class="px-6 py-4 font-semibold">Store ID</th>
                                <th class="px-6 py-4 font-semibold text-gray-800 bg-white border-r">Bill No.</th>
                                <th class="px-6 py-4 font-semibold">Bill Date</th>
                                <th class="px-6 py-4 font-semibold text-center">QTY</th>
                                <th class="px-6 py-4 font-semibold text-right">Total</th>
                                <th class="px-6 py-4 font-semibold">Received Date</th>
                                <th class="px-6 py-4 font-semibold">Status</th>
                                <th class="px-6 py-4 font-semibold text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="billTableBody" class="divide-y divide-gray-50 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 bg-gray-900 text-white rounded-2xl shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-[100] text-sm font-medium">
        Message
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_S5fCo98f9he40ApSUnZks2XC-NB3OSmNBj-43K8MdNLMKtaV6oNLqFHqay_Yb0I/exec'; 
        let currentUser = null;
        let allBills = [];

        window.onload = () => {
            if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_GOOGLE')) {
                document.getElementById('urlWarning').classList.remove('hidden');
            }
        };

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value.trim();
            
            if (!isValidUrl(SCRIPT_URL)) {
                mockLoginFallback(userInp, passInp);
                return;
            }

            toggleLoader(true);
            try {
                const response = await fetch(`${SCRIPT_URL}?action=login&username=${encodeURIComponent(userInp)}&password=${encodeURIComponent(passInp)}`);
                const result = await response.json();
                if (result.success) {
                    currentUser = result.user; 
                    showDashboard();
                } else {
                    showLoginError();
                }
            } catch (error) {
                showToast("⚠️ ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
            } finally {
                toggleLoader(false);
            }
        });

        function isValidUrl(url) {
            try { new URL(url); return true; } catch (_) { return false; }
        }

        function mockLoginFallback(u, p) {
            if (u && p === "1234") {
                currentUser = { code: u, name: "Demo User", store: "S001" };
                showDashboard();
                showToast("💡 เข้าสู่ระบบโหมดทดสอบ");
            } else {
                showLoginError();
            }
        }

        function showLoginError() {
            const err = document.getElementById('loginError');
            err.classList.remove('hidden');
            setTimeout(() => err.classList.add('hidden'), 3000);
        }

        async function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainNav').classList.remove('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('userDisplayName').innerText = `สวัสดี, ${currentUser.name}`;
            await fetchData();
        }

        async function fetchData() {
            const tbody = document.getElementById('billTableBody');
            tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-12 text-center text-gray-400">กำลังดึงข้อมูล...</td></tr>';
            
            if (!isValidUrl(SCRIPT_URL)) {
                allBills = Array.from({length: 10}, (_, i) => ({
                    storeName: "Central Store", 
                    store: "S001", 
                    billNo: `W-2026-00${i+1}`, 
                    billDate: "2026-03-10", 
                    qty: 12, 
                    total: 5900, 
                    receivedDate: i < 3 ? "2026-03-12" : "", 
                    status: i < 3 ? "Received" : "Pending"
                }));
                renderBills(allBills);
                return;
            }

            try {
                const response = await fetch(`${SCRIPT_URL}?action=getBills&store=${encodeURIComponent(currentUser.store)}`);
                const result = await response.json();
                allBills = result.data || [];
                renderBills(allBills);
            } catch (error) {
                showToast("❌ โหลดข้อมูลล้มเหลว");
            }
        }

// ฟังก์ชันช่วยจัดการรูปแบบวันที่ให้เป็น DD/MM/YYYY
function formatToThaiDate(dateInput) {
    if (!dateInput) return "-";
    try {
        const d = new Date(dateInput);
        // ตรวจสอบว่าวันที่ถูกต้องหรือไม่
        if (isNaN(d.getTime())) return dateInput; 

        const day = String(d.getDate()).padStart(2, '0');
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const year = d.getFullYear(); // ใช้ ค.ศ. (ถ้าต้องการ พ.ศ. ให้ + 543)

        return `${day}/${month}/${year}`;
    } catch (e) {
        return dateInput;
    }
}

function renderBills(bills) {
    const tbody = document.getElementById('billTableBody');
    tbody.innerHTML = '';

    if (bills.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-20 text-center text-gray-400">ไม่พบข้อมูลการรับบิล</td></tr>';
        return;
    }

    bills.forEach((bill, index) => {
        const isReceived = !!bill.receivedDate;
        const tr = document.createElement('tr');
        tr.className = "hover:bg-gray-50/50 transition-colors border-b border-gray-50";
        
        // ใช้ฟังก์ชันใหม่ในการแปลง Format
        const displayDate = formatToThaiDate(bill.receivedDate);
        const billDisplayDate = formatToThaiDate(bill.billDate);

        tr.innerHTML = `
            <td class="px-6 py-4 text-gray-700">${bill.storeName}</td>
            <td class="px-6 py-4 text-gray-400 text-xs">${bill.store}</td>
            <td class="px-6 py-4 font-bold text-wacoal-pink bg-white border-r shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">${bill.billNo}</td>
            <td class="px-6 py-4 text-gray-500">${billDisplayDate}</td>
            <td class="px-6 py-4 text-center font-medium">${bill.qty}</td>
            <td class="px-6 py-4 text-right font-bold text-gray-800">฿${Number(bill.total).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
            
            <td class="px-6 py-4 min-w-[180px]">
                ${isReceived ? 
                    `<div class="flex items-center text-green-600 font-bold">
                        <span class="mr-2 text-base">✅</span>
                        <span>${displayDate}</span>
                    </div>` : 
                    `<input type="date" 
                        class="bg-white border border-gray-200 rounded-xl px-3 py-1.5 outline-none focus:border-wacoal-pink text-xs w-full shadow-sm"
                        id="date-${index}">`
                }
            </td>
            
            <td class="px-6 py-4">
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold ${isReceived ? 'bg-green-50 text-green-600' : 'bg-amber-50 text-amber-600'}">
                    <span class="w-1.5 h-1.5 rounded-full mr-1.5 ${isReceived ? 'bg-green-500' : 'bg-amber-500'}"></span>
                    ${isReceived ? 'Received' : 'Pending'}
                </span>
            </td>
            
            <td class="px-6 py-4 text-center">
                ${isReceived ? 
                    `<button onclick="reEdit(${index})" 
                        class="text-gray-400 hover:text-wacoal-pink text-[11px] font-medium transition-colors hover:underline">
                        แก้ไขข้อมูล
                    </button>` :
                    `<button onclick="updateData(${index})" 
                        class="bg-gray-900 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-gray-800 transition-all active:scale-95 shadow-md">
                        บันทึกข้อมูล
                    </button>`
                }
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// เพิ่มฟังก์ชันสำหรับกดแก้ไข (จะล้างค่าวันที่เดิมเพื่อให้ Input ปรากฏขึ้นมาใหม่)
function reEdit(index) {
    allBills[index].receivedDate = "";
    renderBills(allBills);
}

        async function updateData(index) {
            const bill = allBills[index];
            const dateVal = document.getElementById(`date-${index}`).value;
            
            if (!dateVal) {
                showToast("📍 โปรดเลือกวันที่ได้รับ");
                return;
            }

            if (!isValidUrl(SCRIPT_URL)) {
                showToast("✅ บันทึก (Demo) เรียบร้อย");
                allBills[index].receivedDate = dateVal;
                renderBills(allBills);
                return;
            }

            toggleLoader(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'updateDate', billNo: bill.billNo, receivedDate: dateVal })
                });
                showToast("🎉 บันทึกข้อมูลสำเร็จ");
                setTimeout(fetchData, 1200);
            } catch (error) {
                showToast("❌ เกิดข้อผิดพลาด");
            } finally {
                toggleLoader(false);
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('mainNav').classList.add('hidden');
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('loginForm').reset();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
                toast.classList.remove('opacity-100');
            }, 3000);
        }

        function toggleLoader(show) {
            const loader = document.getElementById('globalLoader');
            loader.classList.toggle('hidden', !show);
        }
    </script>
</body>
</html>
